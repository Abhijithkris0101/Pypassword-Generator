<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyPassword Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: rgba(255,255,255,0.07);
      --accent: #00f5a0;
      --accent2: #00c3ff;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,245,160,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(0,195,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .wrapper { width: 100%; max-width: 520px; }
    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .eyebrow::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--accent);
    }
    h1 {
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 2rem;
    }
    h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 1rem;
    }
    .password-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }
    .password-display::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
    }
    #password-text {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      word-break: break-all;
      flex: 1;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    #password-text.placeholder {
      color: var(--muted);
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 0;
    }
    .copy-btn {
      background: rgba(0,245,160,0.1);
      border: 1px solid rgba(0,245,160,0.25);
      color: var(--accent);
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .copy-btn:hover { background: rgba(0,245,160,0.2); border-color: var(--accent); }
    .copy-btn.copied { background: rgba(0,245,160,0.25); }
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease, background 0.4s ease;
      width: 0%;
    }
    .controls-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      margin-bottom: 1.25rem;
    }
    .slider-group { margin-bottom: 1.5rem; }
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }
    .slider-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slider-dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-letters { background: var(--accent); }
    .dot-symbols { background: var(--accent2); }
    .dot-numbers { background: #ff9f43; }
    .slider-value {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 10px;
      min-width: 36px;
      text-align: center;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"].letters-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(0,245,160,0.15);
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    input[type="range"].letters-range::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 6px rgba(0,245,160,0.25);
    }
    input[type="range"].symbols-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 0 4px rgba(0,195,255,0.15);
      cursor: pointer;
    }
    input[type="range"].numbers-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #ff9f43;
      box-shadow: 0 0 0 4px rgba(255,159,67,0.15);
      cursor: pointer;
    }
    .generate-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #0a0a0f;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      text-transform: uppercase;
    }
    .generate-btn:hover { opacity: 0.9; }
    .generate-btn:active { transform: scale(0.99); }
    .footer {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 1.5rem;
      letter-spacing: 0.08em;
    }
    .footer span { color: var(--accent); }
    @keyframes typing {
      from { width: 0; }
      to   { width: 100%; }
    }
    @keyframes blink {
      0%, 100% { border-color: var(--accent); }
      50%       { border-color: transparent; }
    }
    .animate-in {
    display: inline-block;
    overflow: hidden;
    white-space: nowrap;
    border-right: 2px solid var(--accent);
    width: 0;
    animation:
    typing 0.5s steps(30, end) forwards,
    blink  0.75s step-end 0.5s infinite;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <p class="eyebrow">PyPassword Generator</p>
  <h1>Generate a<br><span>secure password</span></h1>
  <div class="card">
    <div class="password-display">
      <span id="password-text" class="placeholder">Your password will appear here</span>
      <button class="copy-btn" id="copy-btn" onclick="copyPassword()">Copy</button>
    </div>
    <div class="strength-bar">
      <div class="strength-fill" id="strength-fill"></div>
    </div>
    <p class="controls-label">Customize your password</p>
    <div class="slider-group">
      <div class="slider-header">
        <span class="slider-label"><span class="slider-dot dot-letters"></span>Letters</span>
        <span class="slider-value" id="letters-val">8</span>
      </div>
      <input type="range" class="letters-range" min="0" max="20" value="8" id="nr-letters"
             oninput="document.getElementById('letters-val').textContent=this.value" />
    </div>
    <div class="slider-group">
      <div class="slider-header">
        <span class="slider-label"><span class="slider-dot dot-symbols"></span>Symbols</span>
        <span class="slider-value" id="symbols-val">3</span>
      </div>
      <input type="range" class="symbols-range" min="0" max="10" value="3" id="nr-symbols"
             oninput="document.getElementById('symbols-val').textContent=this.value" />
    </div>
    <div class="slider-group" style="margin-bottom: 2rem;">
      <div class="slider-header">
        <span class="slider-label"><span class="slider-dot dot-numbers"></span>Numbers</span>
        <span class="slider-value" id="numbers-val">3</span>
      </div>
      <input type="range" class="numbers-range" min="0" max="10" value="3" id="nr-numbers"
             oninput="document.getElementById('numbers-val').textContent=this.value" />
    </div>
    <button class="generate-btn" onclick="generatePassword()">Generate Password</button>
  </div>
  <p class="footer">Built with <span>Python logic</span> → HTML + CSS + JS</p>
</div>
<script>
  const letters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const numbers = '0123456789'.split('');
  const symbols = ['!','#','$','%','&','(',')','+','*'];

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function generatePassword() {
    const nL = parseInt(document.getElementById('nr-letters').value);
    const nS = parseInt(document.getElementById('nr-symbols').value);
    const nN = parseInt(document.getElementById('nr-numbers').value);
    if (nL + nS + nN === 0) { alert('Please select at least one character!'); return; }
    const pool = [
      ...Array.from({length: nL}, () => letters[Math.floor(Math.random() * letters.length)]),
      ...Array.from({length: nS}, () => symbols[Math.floor(Math.random() * symbols.length)]),
      ...Array.from({length: nN}, () => numbers[Math.floor(Math.random() * numbers.length)])
    ];
    const password = shuffle(pool).join('');
    const el = document.getElementById('password-text');
    el.textContent = password;
    el.classList.remove('placeholder', 'animate-in');
    void el.offsetWidth;
    el.classList.add('animate-in');
    document.getElementById('copy-btn').textContent = 'Copy';
    document.getElementById('copy-btn').classList.remove('copied');
    updateStrength(nL, nS, nN);
  }

  function updateStrength(nL, nS, nN) {
    const total = nL + nS + nN;
    const variety = (nL > 0) + (nS > 0) + (nN > 0);
    let score = 0;
    if (total >= 6) score += 20;
    if (total >= 10) score += 20;
    if (total >= 16) score += 20;
    if (variety >= 2) score += 20;
    if (variety === 3) score += 20;
    const fill = document.getElementById('strength-fill');
    fill.style.width = score + '%';
    if (score <= 40) fill.style.background = '#ff4d6d';
    else if (score <= 60) fill.style.background = '#ff9f43';
    else if (score <= 80) fill.style.background = '#00c3ff';
    else fill.style.background = 'linear-gradient(90deg, #00f5a0, #00c3ff)';
  }

  function copyPassword() {
    const text = document.getElementById('password-text').textContent;
    if (!text || text === 'Your password will appear here') return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }
</script>
</body>
</html>
